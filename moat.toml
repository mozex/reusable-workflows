# This repo never uses pull requests, so the "require a pull request" ruleset rule is
# intentionally dropped. Silence the matching Moat check; signed-commit, force-push and
# deletion protection all remain enforced.
[checks]
repositories_pull_requests_require_reviews = "off"
# The reusable changelog and auto-merge workflows declare `contents: write`.
repositories_workflow_permissions_are_restricted = "off"
