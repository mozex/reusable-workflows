name: Code Analysis

on:
  workflow_call:
    secrets:
      TOKEN:
        required: false
        description: 'GitHub Token used to install Composer dependencies.'
    inputs:
      php_version:
        description: 'PHP version to be used.'
        required: false
        type: string
        default: '8.3'
      larastan_config_file:
        description: 'Larastan configuration file.'
        required: false
        type: string
        default: 'phpstan.neon.dist'
      custom_commands:
        description: 'Custom commands to run.'
        required: false
        type: string
        default: ''
      timeout_minutes:
        description: 'Timeout in minutes for the job.'
        required: false
        type: number
        default: 5

permissions:
  contents: read

concurrency:
  group: code-analysis-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  larastan:
    if: "!contains(github.event.head_commit.message, 'wip')"
    name: Larastan
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout_minutes }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: ${{ inputs.php_version }}
          tools: composer:v2
          extensions: dom, curl, libxml, mbstring, zip, fileinfo
          coverage: none

      - name: Custom Commands
        if: "inputs.custom_commands != ''"
        run: ${{ inputs.custom_commands }}

      - name: Install Composer Dependencies
        uses: ramsey/composer-install@26d8a556604053a9612623447203a691f406fbe6 # v4
        with:
          composer-options: "--prefer-dist"
        env:
          COMPOSER_AUTH: '{"github-oauth": {"github.com": "${{ secrets.TOKEN || github.token }}"}}'

      - name: Analyse Code
        run: ./vendor/bin/phpstan analyse -c ${{ inputs.larastan_config_file }} --memory-limit=-1 --error-format=github