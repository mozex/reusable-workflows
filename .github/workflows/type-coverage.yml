name: Type Coverage

on:
  workflow_call:
    secrets:
      TOKEN:
        required: false
        description: 'GitHub Token used to install Composer dependencies.'
    inputs:
      php_version:
        description: 'PHP version to use.'
        required: false
        type: string
        default: '8.3'
      phpunit_config_file:
        description: 'PHPUnit configuration file.'
        required: false
        type: string
        default: 'phpunit.xml'
      min:
        description: 'Minimum threshold enforcement.'
        required: false
        type: number
        default: 100
      custom_commands:
        description: 'Custom commands to run.'
        required: false
        type: string
        default: ''
      enable_sharding:
        description: 'Enable type coverage sharding for parallel execution.'
        required: false
        type: boolean
        default: false
      shard_count:
        description: 'Number of shards to split type coverage into (only used when sharding is enabled).'
        required: false
        type: number
        default: 4
      timeout_minutes:
        description: 'Timeout in minutes for the job.'
        required: false
        type: number
        default: 10

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    if: "!contains(github.event.head_commit.message, 'wip')"
    name: Setup Matrix
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      shards: ${{ steps.generate.outputs.shards }}
    steps:
      - name: Generate Shard Matrix
        id: generate
        shell: bash
        env:
          ENABLED: ${{ inputs.enable_sharding }}
          COUNT: ${{ inputs.shard_count }}
        run: |
          if [ "$ENABLED" = "true" ]; then
            shards=$(seq 1 "$COUNT" | jq -cs .)
          else
            shards='[1]'
          fi
          echo "shards=$shards" >> "$GITHUB_OUTPUT"

  pest:
    needs: setup
    if: "!contains(github.event.head_commit.message, 'wip')"
    name: ${{ inputs.enable_sharding && format('Pest (Shard {0}{1}/{2})', inputs.shard_count >= 10 && matrix.shard < 10 && '0' || '', matrix.shard, inputs.shard_count) || 'Pest' }}
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout_minutes }}
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJson(needs.setup.outputs.shards) }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php_version }}
          coverage: none

      - name: Custom Commands
        if: "inputs.custom_commands != ''"
        run: ${{ inputs.custom_commands }}

      - name: Install Composer Dependencies
        uses: ramsey/composer-install@v4
        with:
          composer-options: "--prefer-dist"
        env:
          COMPOSER_AUTH: '{"github-oauth": {"github.com": "${{ secrets.TOKEN }}"}}'

      - name: Prepare PHPUnit Configuration
        if: "inputs.phpunit_config_file != 'phpunit.xml'"
        run: cp -f ${{ inputs.phpunit_config_file }} phpunit.xml

      - name: Check Coverage
        if: inputs.enable_sharding == false
        run: ./vendor/bin/pest --type-coverage --min=${{ inputs.min }} --compact

      - name: Check Coverage Sharded
        if: inputs.enable_sharding == true
        run: ./vendor/bin/pest --type-coverage --min=${{ inputs.min }} --compact --shard=${{ matrix.shard }}/${{ inputs.shard_count }}
