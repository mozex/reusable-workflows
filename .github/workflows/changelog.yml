name: Changelog

on:
  workflow_call:
    inputs:
      ref:
        description: 'Branch to check out and commit the updated changelog to. Defaults to the release target branch.'
        required: false
        type: string
        default: ''
      commit_message:
        description: 'Commit message for the changelog update.'
        required: false
        type: string
        default: 'Update CHANGELOG'
      file_pattern:
        description: 'File pattern for the committed changelog.'
        required: false
        type: string
        default: 'CHANGELOG.md'
      timeout_minutes:
        description: 'Timeout in minutes for the job.'
        required: false
        type: number
        default: 5

permissions:
  contents: write

concurrency:
  group: changelog-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    name: Update
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout_minutes }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.ref || github.event.release.target_commitish }}

      - name: Update Changelog
        uses: stefanzweifel/changelog-updater-action@a938690fad7edf25368f37e43a1ed1b34303eb36 # v1
        with:
          latest-version: ${{ github.event.release.name }}
          release-notes: ${{ github.event.release.body }}

      # Commit via the GitHub API (GraphQL) so GitHub signs the commit server-side and it
      # lands as a Verified commit — satisfies a `required_signatures` ruleset with the plain
      # GITHUB_TOKEN (no PAT, no GPG key). Requires the calling job to grant `contents: write`.
      - name: Commit Updated Changelog
        uses: planetscale/ghcommit-action@a6b150b81dca5dd027baa898604418eec9e11465 # v0.2.22
        with:
          commit_message: ${{ inputs.commit_message }}
          repo: ${{ github.repository }}
          branch: ${{ inputs.ref || github.event.release.target_commitish }}
          file_pattern: ${{ inputs.file_pattern }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
